<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded code-block frame -->
  <rect x="100" y="110" width="312" height="292" rx="28"
        stroke="white" stroke-width="36" fill="none"/>
  <!-- "Call" chevron pointing right (function invocation) -->
  <path d="M 170,200 L 250,270 L 170,340"
        stroke="white" stroke-width="36" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Amber Lua accent dot after the chevron -->
  <circle cx="340" cy="270" r="32" fill="#ff00ff"/>
</svg>
