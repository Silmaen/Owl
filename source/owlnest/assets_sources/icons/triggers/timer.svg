<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Clock face -->
  <circle cx="256" cy="276" r="190" stroke="white" stroke-width="28" fill="none"/>
  <!-- Top knob -->
