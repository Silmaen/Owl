  <!-- Hour hand -->
  <line x1="256" y1="276" x2="256" y2="160" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="276" x2="350" y2="230" stroke="white" stroke-width="18" stroke-linecap="round"/>
