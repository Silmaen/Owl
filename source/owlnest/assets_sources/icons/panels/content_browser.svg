<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 2x2 grid of tiles with a single highlighted inner mark per tile.
       Removed the fine horizontal text lines (stroke 16) that were invisible at 64px. -->
  <rect x="85" y="85" width="160" height="160" rx="20" stroke="white" stroke-width="32" fill="none"/>
  <rect x="267" y="85" width="160" height="160" rx="20" stroke="white" stroke-width="32" fill="none"/>
  <rect x="85" y="267" width="160" height="160" rx="20" stroke="white" stroke-width="32" fill="none"/>
  <rect x="267" y="267" width="160" height="160" rx="20" stroke="white" stroke-width="32" fill="none"/>
  <!-- Inner fill on the selected (top-left) tile to suggest "content" -->
  <rect x="117" y="117" width="96" height="96" rx="10" fill="white" stroke="none"/>
</svg>
