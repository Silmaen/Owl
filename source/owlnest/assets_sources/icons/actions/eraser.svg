<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="512"
   height="512"
   viewBox="0 0 135.46667 135.46667"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <!-- Eraser body — angled rounded rectangle in accent colour. -->
  <g transform="rotate(-30 67.7333 67.7333)">
    <rect x="32" y="56" width="72" height="32" rx="6" ry="6"
          style="fill:#ff00ff;stroke:#ffffff;stroke-width:3" />
    <!-- Worn-rubber tip on the left — slightly lighter -->
    <rect x="32" y="56" width="22" height="32" rx="6" ry="6"
          style="fill:#ffffff;fill-opacity:0.5;stroke:#ffffff;stroke-width:3" />
    <!-- Crumb marks behind the eraser to suggest motion -->
  </g>
  <!-- Crumb marks behind the eraser (post-rotation, to keep them aligned with the canvas) -->
  <circle cx="34" cy="100" r="3" style="fill:#ffffff;fill-opacity:0.6" />
  <circle cx="44" cy="108" r="2.5" style="fill:#ffffff;fill-opacity:0.45" />
  <circle cx="54" cy="113" r="2" style="fill:#ffffff;fill-opacity:0.3" />
</svg>
