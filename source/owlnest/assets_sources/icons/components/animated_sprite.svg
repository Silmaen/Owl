<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Filmstrip-style: outer frame + punched sprocket holes + play triangle -->
  <rect x="90" y="100" width="332" height="312" rx="24" stroke="white" stroke-width="32" fill="none"/>
  <!-- Sprocket holes (filled, clearly visible at 64px) -->
  <rect x="120" y="130" width="30" height="30" fill="white"/>
  <rect x="120" y="352" width="30" height="30" fill="white"/>
  <rect x="362" y="130" width="30" height="30" fill="white"/>
  <rect x="362" y="352" width="30" height="30" fill="white"/>
  <!-- Centered play triangle -->
  <polygon points="215,195 215,317 310,256" fill="white"/>
</svg>
