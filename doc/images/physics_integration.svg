<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440">
  <!-- Dark background for readability on both light and dark pages -->
  <rect id="background" x="0" y="0" width="800" height="440" rx="12" ry="12" fill="#1c2128"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d29922"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold">Physics Lifecycle</text>

  <!-- ===== Phase labels ===== -->
  <text x="130" y="52" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">Initialization</text>
  <text x="430" y="52" text-anchor="middle" fill="#d29922" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">Runtime (each frame)</text>
  <text x="710" y="52" text-anchor="middle" fill="#f85149" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">Shutdown</text>

  <!-- ===== Phase separator lines ===== -->
  <line x1="268" y1="42" x2="268" y2="400" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="598" y1="42" x2="598" y2="400" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- ===== LEFT PHASE: Initialization (green) ===== -->

  <!-- onStartRuntime -->
  <rect x="40" y="68" width="180" height="36" rx="8" ry="8" fill="#3fb950" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="91" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold">onStartRuntime()</text>

  <!-- Arrow down -->
  <line x1="130" y1="104" x2="130" y2="124" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowhead-green)"/>

  <!-- PhysicCommand::init(scene) -->
  <rect x="28" y="130" width="204" height="36" rx="8" ry="8" fill="#2d333b" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="153" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">PhysicCommand::init(scene)</text>

  <!-- Arrow down -->
  <line x1="130" y1="166" x2="130" y2="186" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowhead-green)"/>

  <!-- Create Box2D World -->
  <rect x="38" y="192" width="184" height="36" rx="8" ry="8" fill="#2d333b" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="215" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Create Box2D World</text>

  <!-- Arrow down -->
  <line x1="130" y1="228" x2="130" y2="248" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowhead-green)"/>

  <!-- For each loop box -->
  <rect x="20" y="254" width="220" height="64" rx="8" ry="8" fill="#2d333b" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="130" y="274" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">for each PhysicBody + Transform</text>
  <text x="130" y="306" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Create Box2D Body</text>

  <!-- ===== CENTER PHASE: Runtime (orange) ===== -->

  <!-- onUpdateRuntime -->
  <rect x="340" y="68" width="180" height="36" rx="8" ry="8" fill="#d29922" stroke="#d29922" stroke-width="1.5"/>
  <text x="430" y="91" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold">onUpdateRuntime()</text>

  <!-- Arrow down -->
  <line x1="430" y1="104" x2="430" y2="124" stroke="#d29922" stroke-width="2" marker-end="url(#arrowhead-orange)"/>

  <!-- PhysicCommand::frame(ts) -->
  <rect x="324" y="130" width="212" height="36" rx="8" ry="8" fill="#2d333b" stroke="#d29922" stroke-width="1.5"/>
  <text x="430" y="153" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">PhysicCommand::frame(ts)</text>

  <!-- Arrow down -->
  <line x1="430" y1="166" x2="430" y2="186" stroke="#d29922" stroke-width="2" marker-end="url(#arrowhead-orange)"/>

  <!-- Box2D Step -->
  <rect x="350" y="192" width="160" height="36" rx="8" ry="8" fill="#2d333b" stroke="#d29922" stroke-width="1.5"/>
  <text x="430" y="215" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Box2D Step</text>

  <!-- Arrow down -->
  <line x1="430" y1="228" x2="430" y2="248" stroke="#d29922" stroke-width="2" marker-end="url(#arrowhead-orange)"/>

  <!-- Sync transforms -->
  <rect x="345" y="254" width="170" height="36" rx="8" ry="8" fill="#2d333b" stroke="#d29922" stroke-width="1.5"/>
  <text x="430" y="277" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Sync transforms</text>

  <!-- Arrow down -->
  <line x1="430" y1="290" x2="430" y2="310" stroke="#d29922" stroke-width="2" marker-end="url(#arrowhead-orange)"/>

  <!-- Trigger detection -->
  <rect x="345" y="316" width="170" height="36" rx="8" ry="8" fill="#2d333b" stroke="#d29922" stroke-width="1.5"/>
  <text x="430" y="339" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Trigger detection</text>

  <!-- Player inputs side branch -->
  <rect x="280" y="370" width="186" height="36" rx="8" ry="8" fill="#2d333b" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="373" y="393" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Player::parseInputs()</text>

  <!-- Arrow from parseInputs to impulse -->
  <line x1="466" y1="388" x2="486" y2="388" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="492" y="370" width="100" height="36" rx="8" ry="8" fill="#2d333b" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="542" y="386" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="10">PhysicCommand</text>
  <text x="542" y="400" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="10">::impulse()</text>

  <!-- Dashed arrow from parseInputs up to Box2D step -->
  <line x1="542" y1="370" x2="510" y2="228" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <text x="545" y="300" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-style="italic">feeds into</text>

  <!-- ===== RIGHT PHASE: Shutdown (red) ===== -->

  <!-- onEndRuntime -->
  <rect x="620" y="68" width="160" height="36" rx="8" ry="8" fill="#f85149" stroke="#f85149" stroke-width="1.5"/>
  <text x="700" y="91" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold">onEndRuntime()</text>

  <!-- Arrow down -->
  <line x1="700" y1="104" x2="700" y2="124" stroke="#f85149" stroke-width="2" marker-end="url(#arrowhead-red)"/>

  <!-- PhysicCommand::destroy() -->
  <rect x="610" y="130" width="190" height="36" rx="8" ry="8" fill="#2d333b" stroke="#f85149" stroke-width="1.5"/>
  <text x="705" y="153" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">PhysicCommand::destroy()</text>

  <!-- Arrow down -->
  <line x1="700" y1="166" x2="700" y2="186" stroke="#f85149" stroke-width="2" marker-end="url(#arrowhead-red)"/>

  <!-- Destroy Box2D World -->
  <rect x="616" y="192" width="178" height="36" rx="8" ry="8" fill="#2d333b" stroke="#f85149" stroke-width="1.5"/>
  <text x="705" y="215" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Destroy Box2D World</text>

  <!-- Arrow down -->
  <line x1="700" y1="228" x2="700" y2="248" stroke="#f85149" stroke-width="2" marker-end="url(#arrowhead-red)"/>

  <!-- Clear body IDs -->
  <rect x="626" y="254" width="158" height="36" rx="8" ry="8" fill="#2d333b" stroke="#f85149" stroke-width="1.5"/>
  <text x="705" y="277" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Clear body IDs</text>

  <!-- ===== Legend ===== -->
  <rect x="15" y="408" width="770" height="24" rx="6" ry="6" fill="none" stroke="#8b949e" stroke-width="0.5"/>
  <rect x="25" y="414" width="12" height="12" rx="3" ry="3" fill="#3fb950"/>
  <text x="42" y="424" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Init</text>
  <rect x="80" y="414" width="12" height="12" rx="3" ry="3" fill="#d29922"/>
  <text x="97" y="424" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Runtime</text>
  <rect x="155" y="414" width="12" height="12" rx="3" ry="3" fill="#f85149"/>
  <text x="172" y="424" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Shutdown</text>
  <rect x="230" y="414" width="12" height="12" rx="3" ry="3" fill="#1f6feb"/>
  <text x="247" y="424" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Player input</text>
  <line x1="320" y1="420" x2="350" y2="420" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="360" y="424" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">flow</text>
  <line x1="400" y1="420" x2="430" y2="420" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <text x="440" y="424" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">data reference</text>
</svg>
