<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Dark background -->
  <rect id="background" x="0" y="0" width="800" height="480" rx="12" ry="12" fill="#1c2128"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowhead-accent" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e6edf3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="310" y="30" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold">Event Dispatch Flow</text>

  <!-- Row 1: GLFW Window -->
  <rect x="210" y="48" width="200" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="310" y="75" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">GLFW Window</text>
  <text x="310" y="104" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">keyboard / mouse / window callbacks</text>

  <!-- Arrow Row 1 -> Row 2 -->
  <line x1="310" y1="92" x2="310" y2="120" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Row 2: Window (owl::window) -->
  <rect x="175" y="130" width="270" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="310" y="150" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">owl::window</text>
  <text x="310" y="165" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">Window creates Event objects</text>

  <!-- Arrow Row 2 -> Row 3 -->
  <line x1="310" y1="174" x2="310" y2="202" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Row 3: Application::onEvent (accent box) -->
  <rect x="140" y="212" width="340" height="50" rx="8" ry="8" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="310" y="234" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">Application::onEvent()</text>
  <text x="310" y="252" text-anchor="middle" fill="#c8d1d9" font-family="system-ui, -apple-system, sans-serif" font-size="11">iterates layers back-to-front (reverse)</text>

  <!-- Fork arrows from Application to two layer boxes -->
  <line x1="250" y1="262" x2="160" y2="310" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="370" y1="262" x2="400" y2="310" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Row 4 Left: Editor / GUI Layer (overlay, checked first) -->
  <rect x="40" y="320" width="230" height="58" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="155" y="342" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">Editor / GUI Layer</text>
  <text x="155" y="358" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">overlay — checked first</text>
  <text x="155" y="372" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">EventDispatcher::dispatch&lt;T&gt;()</text>

  <!-- Row 4 Right: Game Layer -->
  <rect x="310" y="320" width="210" height="58" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="415" y="342" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">Game Layer</text>
  <text x="415" y="358" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">checked second</text>
  <text x="415" y="372" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">EventDispatcher::dispatch&lt;T&gt;()</text>

  <!-- Propagation stop note -->
  <rect x="80" y="400" width="440" height="32" rx="6" ry="6" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="300" y="421" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic">if event.handled = true, propagation stops</text>

  <!-- Right side box: Input Polling -->
  <rect x="590" y="60" width="190" height="110" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="685" y="82" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">Input Polling</text>
  <text x="685" y="102" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">separate from event flow</text>
  <line x1="610" y1="112" x2="760" y2="112" stroke="#8b949e" stroke-width="0.5"/>
  <text x="685" y="130" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="11">Input::isKeyPressed()</text>
  <text x="685" y="148" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="11">Input::isMouseButtonPressed()</text>
  <text x="685" y="166" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="11">Input::getMousePos()</text>

  <!-- Right side box: ActionRegistry -->
  <rect x="590" y="195" width="190" height="90" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="685" y="217" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">ActionRegistry</text>
  <text x="685" y="237" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">keyboard shortcuts</text>
  <line x1="610" y1="247" x2="760" y2="247" stroke="#8b949e" stroke-width="0.5"/>
  <text x="685" y="265" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="11">Shortcut (Key + Modifiers)</text>
  <text x="685" y="280" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="11">dispatch(KeyPressedEvent)</text>

  <!-- Dashed arrow from Editor Layer to ActionRegistry -->
  <line x1="270" y1="340" x2="580" y2="250" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>

  <!-- Layer labels on far left -->
  <text x="10" y="75" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">OS / Backend</text>
  <text x="10" y="155" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Abstraction</text>
  <text x="10" y="240" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Application</text>
  <text x="10" y="345" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Layers</text>

  <!-- Legend -->
  <rect x="15" y="445" width="770" height="25" rx="6" ry="6" fill="none" stroke="#8b949e" stroke-width="0.5"/>
  <text x="30" y="462" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">Legend:</text>
  <line x1="90" y1="458" x2="130" y2="458" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="140" y="463" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">event flow</text>
  <line x1="250" y1="458" x2="290" y2="458" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="300" y="463" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">delegates to</text>
  <rect x="420" y="451" width="40" height="14" rx="4" ry="4" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="470" y="463" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">key entry point</text>
  <rect x="600" y="451" width="40" height="14" rx="4" ry="4" fill="#2d333b" stroke="#8b949e" stroke-width="1"/>
  <text x="650" y="463" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">component</text>
</svg>
