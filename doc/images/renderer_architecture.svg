<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="680" viewBox="0 0 800 680">
  <rect id="background" x="0" y="0" width="800" height="680" rx="12" ry="12" fill="#1c2128"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold">Renderer Architecture</text>

  <!-- ===== Top Layer: Callers ===== -->
  <text x="400" y="55" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic">Callers</text>

  <rect x="120" y="65" width="180" height="38" rx="8" ry="8" fill="#1f6feb" stroke="#8b949e" stroke-width="1.5"/>
  <text x="210" y="89" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">Scene::render()</text>

  <rect x="500" y="65" width="180" height="38" rx="8" ry="8" fill="#1f6feb" stroke="#8b949e" stroke-width="1.5"/>
  <text x="590" y="89" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">Application Code</text>

  <!-- Arrows down -->
  <line x1="210" y1="103" x2="210" y2="145" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="590" y1="103" x2="430" y2="145" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="170" y1="103" x2="100" y2="145" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== Second Layer: High-level Renderers ===== -->
  <text x="400" y="137" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic">High-Level Renderers</text>

  <rect x="25" y="148" width="190" height="38" rx="8" ry="8" fill="#2d333b" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="120" y="172" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">BackgroundRenderer</text>

  <rect x="240" y="148" width="150" height="38" rx="8" ry="8" fill="#2d333b" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="315" y="172" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">Renderer2D</text>

  <rect x="415" y="148" width="130" height="38" rx="8" ry="8" fill="#2d333b" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="480" y="172" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">Renderer</text>

  <!-- Arrows down to RenderCommand -->
  <line x1="120" y1="186" x2="300" y2="240" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="315" y1="186" x2="370" y2="240" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="480" y1="186" x2="440" y2="240" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== Third Layer: RenderCommand ===== -->
  <rect x="260" y="242" width="220" height="38" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="2"/>
  <text x="370" y="266" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold">RenderCommand</text>
  <text x="370" y="290" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">static facade → delegates to RenderAPI</text>

  <!-- Arrow down to RenderAPI -->
  <line x1="370" y1="280" x2="370" y2="320" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== Fourth Layer: RenderAPI (abstract) ===== -->
  <rect x="240" y="322" width="260" height="38" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="370" y="346" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-style="italic">RenderAPI (abstract)</text>

  <!-- Arrows to backends -->
  <line x1="310" y1="360" x2="150" y2="400" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="370" y1="360" x2="370" y2="400" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="430" y1="360" x2="590" y2="400" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ===== Fifth Layer: Backends ===== -->
  <rect x="80" y="402" width="140" height="34" rx="6" ry="6" fill="#1a2332" stroke="#58a6ff" stroke-width="1"/>
  <text x="150" y="424" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="13">OpenGL 4.5</text>

  <rect x="300" y="402" width="140" height="34" rx="6" ry="6" fill="#1a2332" stroke="#58a6ff" stroke-width="1"/>
  <text x="370" y="424" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="13">Vulkan 1.3</text>

  <rect x="520" y="402" width="140" height="34" rx="6" ry="6" fill="#1a2332" stroke="#58a6ff" stroke-width="1"/>
  <text x="590" y="424" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="13">Null (headless)</text>

  <!-- ===== Right side: Data objects ===== -->
  <line x1="570" y1="135" x2="770" y2="135" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="435" x2="770" y2="435" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="690" y="130" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic">Data Objects</text>

  <rect x="600" y="148" width="170" height="30" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="685" y="168" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Shader (Slang → SPIR-V)</text>

  <rect x="600" y="188" width="170" height="30" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="685" y="208" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Texture2D</text>

  <rect x="600" y="228" width="170" height="30" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="685" y="248" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Framebuffer</text>

  <rect x="600" y="268" width="170" height="30" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="685" y="288" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">DrawData (VBO + IBO)</text>

  <rect x="600" y="308" width="170" height="30" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="685" y="328" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">UniformBuffer</text>

  <!-- Dashed arrows from data objects to Renderer2D -->
  <line x1="600" y1="163" x2="390" y2="163" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <line x1="600" y1="203" x2="390" y2="170" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <!-- ===== Bottom: Legend ===== -->
  <line x1="20" y1="460" x2="780" y2="460" stroke="#8b949e" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- Renderer2D capabilities -->
  <text x="400" y="480" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic">Renderer2D Primitives</text>

  <rect x="40" y="495" width="90" height="26" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="85" y="513" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">drawQuad</text>

  <rect x="140" y="495" width="90" height="26" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="185" y="513" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">drawCircle</text>

  <rect x="240" y="495" width="90" height="26" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="285" y="513" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">drawLine</text>

  <rect x="340" y="495" width="90" height="26" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="385" y="513" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">drawRect</text>

  <rect x="440" y="495" width="90" height="26" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="485" y="513" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">drawPolyLine</text>

  <rect x="540" y="495" width="90" height="26" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="585" y="513" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">drawString</text>

  <rect x="640" y="495" width="130" height="26" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="705" y="513" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">drawBackground</text>

  <!-- Batch info -->
  <text x="400" y="550" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic">Batch Limits</text>
  <rect x="120" y="560" width="200" height="24" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="220" y="577" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">20,000 quads / batch</text>
  <rect x="340" y="560" width="200" height="24" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="440" y="577" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">120,000 indices / batch</text>
  <rect x="560" y="560" width="200" height="24" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="660" y="577" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">GPU max texture slots</text>

  <!-- Legend -->
  <text x="400" y="620" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">
    Solid arrows: call flow | Dashed arrows: data dependency | Dashed border: abstract interface
  </text>
</svg>
