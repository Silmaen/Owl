<svg xmlns="http://www.w3.org/2000/svg" width="800" height="580" viewBox="0 0 800 580">
  <!-- Dark background for readability on both light and dark pages -->
  <rect id="background" x="0" y="0" width="800" height="580" rx="12" ry="12" fill="#1c2128"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-return" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold">Sound Component Data Flow</text>

  <!-- ========== LEFT: Entity container ========== -->
  <rect x="15" y="50" width="160" height="380" rx="8" ry="8" fill="none" stroke="#8b949e" stroke-width="1.5"/>
  <text x="95" y="72" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">Entity</text>

  <!-- Transform sub-box -->
  <rect x="25" y="85" width="140" height="40" rx="6" ry="6" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="95" y="110" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">Transform</text>

  <!-- SoundSource sub-box -->
  <rect x="25" y="140" width="140" height="110" rx="6" ry="6" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="95" y="162" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">SoundSource</text>
  <text x="35" y="180" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">soundAsset</text>
  <text x="35" y="194" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">volume, pitch, loop</text>
  <text x="35" y="208" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">spatial, maxDistance</text>
  <text x="35" y="222" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">playOnStart</text>
  <line x1="30" y1="230" x2="160" y2="230" stroke="#8b949e" stroke-width="0.5"/>
  <text x="35" y="244" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">runtimeHandle</text>

  <!-- SoundListener sub-box -->
  <rect x="25" y="265" width="140" height="40" rx="6" ry="6" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="95" y="290" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">SoundListener</text>

  <!-- Hierarchy note -->
  <rect x="25" y="320" width="140" height="40" rx="6" ry="6" fill="#2d333b" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="95" y="345" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">Hierarchy</text>

  <!-- Parent Transform note -->
  <rect x="25" y="375" width="140" height="40" rx="6" ry="6" fill="none" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="95" y="393" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">getWorldTransform()</text>
  <text x="95" y="407" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">= local * parent chain</text>

  <!-- ========== MIDDLE: Processing ========== -->

  <!-- Flow 1: soundAsset -> SoundLibrary -> SoundData -->
  <text x="230" y="68" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Asset Loading</text>

  <rect x="200" y="78" width="130" height="40" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="265" y="103" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">SoundLibrary</text>

  <line x1="165" y1="175" x2="200" y2="98" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="170" y="128" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">soundAsset</text>

  <rect x="370" y="78" width="120" height="40" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="430" y="103" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">SoundData</text>

  <line x1="330" y1="98" x2="370" y2="98" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="350" y="91" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">get()</text>

  <!-- Flow 2: SoundSource fields -> PlayParams -> SoundCommand::play() -->
  <text x="230" y="152" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Playback Start</text>

  <rect x="200" y="162" width="120" height="40" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="260" y="187" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">PlayParams</text>

  <line x1="165" y1="195" x2="200" y2="185" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="168" y="197" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">fields</text>

  <rect x="360" y="155" width="170" height="50" rx="8" ry="8" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="445" y="176" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">SoundCommand</text>
  <text x="445" y="194" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">::play()</text>

  <line x1="320" y1="182" x2="360" y2="180" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SoundData feeds into play() -->
  <line x1="460" y1="118" x2="460" y2="155" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="140" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">buffer</text>

  <!-- SoundHandle returned -->
  <rect x="560" y="162" width="120" height="40" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="620" y="187" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">SoundHandle</text>

  <line x1="530" y1="180" x2="560" y2="180" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SoundHandle returned back to runtimeHandle -->
  <path d="M 620 202 L 620 240 L 155 240" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-return)"/>
  <text x="400" y="235" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">stored in runtimeHandle</text>

  <!-- Flow 3: Per-frame source position update -->
  <text x="230" y="280" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Per-Frame Source Update</text>

  <rect x="200" y="290" width="150" height="40" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="275" y="315" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">getWorldTransform()</text>

  <line x1="165" y1="105" x2="200" y2="305" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="390" y="290" width="170" height="40" rx="8" ry="8" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="475" y="315" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">::setPosition(handle)</text>

  <line x1="350" y1="310" x2="390" y2="310" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Flow 4: Per-frame listener update -->
  <text x="230" y="360" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Per-Frame Listener Update</text>

  <rect x="200" y="370" width="150" height="40" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="275" y="395" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">getWorldTransform()</text>

  <line x1="165" y1="285" x2="200" y2="385" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="165" y1="105" x2="190" y2="385" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <rect x="390" y="360" width="200" height="55" rx="8" ry="8" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="490" y="383" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">::setListenerPosition()</text>
  <text x="490" y="403" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">::setListenerOrientation()</text>

  <line x1="350" y1="390" x2="390" y2="388" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ========== RIGHT: OpenAL ========== -->
  <rect x="650" y="258" width="135" height="190" rx="8" ry="8" fill="none" stroke="#8b949e" stroke-width="1.5"/>
  <text x="718" y="280" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">OpenAL</text>

  <rect x="662" y="292" width="110" height="34" rx="6" ry="6" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="717" y="314" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">AL Source 1</text>

  <rect x="662" y="334" width="110" height="34" rx="6" ry="6" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="717" y="356" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">AL Source 2</text>

  <rect x="662" y="376" width="110" height="34" rx="6" ry="6" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="717" y="398" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">AL Source N</text>

  <rect x="662" y="418" width="110" height="24" rx="6" ry="6" fill="#2d333b" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="717" y="435" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="12">AL Listener</text>

  <!-- Arrows from SoundCommand to OpenAL -->
  <line x1="560" y1="310" x2="650" y2="309" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="395" x2="650" y2="435" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SoundData -> AL Buffer note -->
  <line x1="490" y1="98" x2="662" y2="309" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="575" y="185" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9" transform="rotate(22, 575, 185)">AL Buffer</text>

  <!-- Legend -->
  <rect x="15" y="465" width="770" height="105" rx="8" ry="8" fill="none" stroke="#8b949e" stroke-width="0.5"/>
  <text x="30" y="485" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold">Legend:</text>
  <line x1="30" y1="502" x2="70" y2="502" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="80" y="506" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">data flow / call</text>
  <line x1="250" y1="502" x2="290" y2="502" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-return)"/>
  <text x="300" y="506" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">return / feedback</text>
  <rect x="480" y="493" width="40" height="16" rx="4" ry="4" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="530" y="506" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">SoundCommand methods</text>

  <!-- Flow summary -->
  <text x="30" y="530" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">1. On start: SoundSource.soundAsset resolves via SoundLibrary to SoundData, then SoundCommand::play(data, params) returns a SoundHandle.</text>
  <text x="30" y="547" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">2. Per frame: Transform + Hierarchy chain yields world position, pushed to OpenAL via setPosition() / setListenerPosition().</text>
  <text x="30" y="564" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">3. SoundHelper bridges entity components to SoundCommand, building PlayParams from SoundSource fields automatically.</text>
</svg>
