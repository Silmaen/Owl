<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560">
  <!-- Dark background for readability on both light and dark pages -->
  <rect id="background" x="0" y="0" width="800" height="560" rx="12" ry="12" fill="#1c2128"/>
  <!-- Arrowhead marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold">Backend Abstraction Pattern</text>

  <!-- Column labels -->
  <text x="140" y="60" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic">Graphics Rendering</text>
  <text x="400" y="60" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic">Input Handling</text>
  <text x="660" y="60" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-style="italic">Sound System</text>

  <!-- Vertical separator lines -->
  <line x1="267" y1="50" x2="267" y2="540" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="533" y1="50" x2="533" y2="540" stroke="#8b949e" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- ==================== COLUMN 1: Graphics ==================== -->

  <!-- Static Facade: RenderCommand -->
  <rect x="40" y="80" width="200" height="50" rx="8" ry="8" fill="#1f6feb" stroke="#8b949e" stroke-width="1.5"/>
  <text x="140" y="101" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic">static facade</text>
  <text x="140" y="119" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">RenderCommand</text>

  <!-- Arrow: Facade -> Abstract (owns uniq<>) -->
  <line x1="140" y1="130" x2="140" y2="185" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="152" y="163" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">owns uniq&lt;&gt;</text>

  <!-- Abstract Base: RenderAPI -->
  <rect x="40" y="188" width="200" height="56" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="140" y="211" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">&#171;abstract&#187;</text>
  <text x="140" y="232" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">RenderAPI</text>

  <!-- Arrow: Abstract -> Implementations (create(Type)) -->
  <line x1="90"  y1="244" x2="70"  y2="310" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="244" x2="140" y2="310" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="190" y1="244" x2="210" y2="310" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="140" y="282" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">create(Type)</text>

  <!-- Concrete: OpenGL -->
  <rect x="15" y="313" width="110" height="44" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="70" y="330" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">opengl</text>
  <text x="70" y="347" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">GLRenderAPI</text>

  <!-- Concrete: Vulkan -->
  <rect x="85" y="365" width="110" height="44" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="140" y="382" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">vulkan</text>
  <text x="140" y="399" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">VkRenderAPI</text>

  <!-- Concrete: Null -->
  <rect x="155" y="313" width="110" height="44" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="210" y="330" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">null</text>
  <text x="210" y="347" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">NullRenderAPI</text>

  <!-- ==================== COLUMN 2: Input ==================== -->

  <!-- Static Facade: Input -->
  <rect x="300" y="80" width="200" height="50" rx="8" ry="8" fill="#1f6feb" stroke="#8b949e" stroke-width="1.5"/>
  <text x="400" y="101" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic">static facade</text>
  <text x="400" y="119" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">Input</text>

  <!-- Arrow: Facade -> Abstract -->
  <line x1="400" y1="130" x2="400" y2="185" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="412" y="163" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">owns uniq&lt;&gt;</text>

  <!-- Abstract Base: Input -->
  <rect x="300" y="188" width="200" height="56" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="211" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">&#171;abstract&#187;</text>
  <text x="400" y="232" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">InputManager</text>

  <!-- Arrow: Abstract -> Implementations -->
  <line x1="360" y1="244" x2="340" y2="310" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="244" x2="460" y2="310" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="400" y="282" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">create(Type)</text>

  <!-- Concrete: GLFW Input -->
  <rect x="285" y="313" width="110" height="44" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="340" y="330" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">glfw</text>
  <text x="340" y="347" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">GlfwInput</text>

  <!-- Concrete: Null Input -->
  <rect x="405" y="313" width="110" height="44" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="460" y="330" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">null</text>
  <text x="460" y="347" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">NullInput</text>

  <!-- ==================== COLUMN 3: Sound ==================== -->

  <!-- Static Facade: SoundCommand -->
  <rect x="560" y="80" width="200" height="50" rx="8" ry="8" fill="#1f6feb" stroke="#8b949e" stroke-width="1.5"/>
  <text x="660" y="101" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic">static facade</text>
  <text x="660" y="119" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">SoundCommand</text>

  <!-- Arrow: Facade -> Abstract -->
  <line x1="660" y1="130" x2="660" y2="185" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="672" y="163" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">owns uniq&lt;&gt;</text>

  <!-- Abstract Base: SoundAPI -->
  <rect x="560" y="188" width="200" height="56" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="660" y="211" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">&#171;abstract&#187;</text>
  <text x="660" y="232" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">SoundAPI</text>

  <!-- Arrow: Abstract -> Implementations -->
  <line x1="620" y1="244" x2="600" y2="310" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="244" x2="720" y2="310" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="660" y="282" text-anchor="middle" fill="#58a6ff" font-family="system-ui, -apple-system, sans-serif" font-size="10">create(Type)</text>

  <!-- Concrete: OpenAL -->
  <rect x="545" y="313" width="110" height="44" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="600" y="330" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">openal</text>
  <text x="600" y="347" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">ALSoundAPI</text>

  <!-- Concrete: Null Sound -->
  <rect x="665" y="313" width="110" height="44" rx="8" ry="8" fill="#2d333b" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="720" y="330" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="9">null</text>
  <text x="720" y="347" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13">NullSoundAPI</text>

  <!-- ==================== Legend ==================== -->
  <rect x="200" y="445" width="400" height="100" rx="8" ry="8" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="400" y="468" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold">Pattern</text>

  <!-- Legend items -->
  <rect x="220" y="480" width="16" height="12" rx="3" ry="3" fill="#1f6feb" stroke="#8b949e" stroke-width="1"/>
  <text x="244" y="491" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">Static facade (client-facing API)</text>

  <rect x="220" y="500" width="16" height="12" rx="3" ry="3" fill="#2d333b" stroke="#8b949e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="244" y="511" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">Abstract base (dashed border)</text>

  <rect x="220" y="520" width="16" height="12" rx="3" ry="3" fill="#2d333b" stroke="#58a6ff" stroke-width="1"/>
  <text x="244" y="531" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">Concrete implementation (selected at init via Type enum)</text>
</svg>
