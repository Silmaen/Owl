<svg xmlns="http://www.w3.org/2000/svg" width="800" height="620" viewBox="0 0 800 620">
  <!-- Dark background for readability on both light and dark pages -->
  <rect id="background" x="0" y="0" width="800" height="620" rx="12" ry="12" fill="#1c2128"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowhead-accent" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e6edf3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold">Sound System Architecture</text>

  <!-- Layer 1: Gameplay Code and Scene Runtime -->
  <rect x="150" y="50" width="180" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="240" y="77" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">Gameplay Code</text>

  <rect x="440" y="50" width="180" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="530" y="77" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">Scene Runtime</text>

  <!-- Arrows Layer 1 -> Layer 2 -->
  <line x1="240" y1="94" x2="240" y2="140" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="530" y1="94" x2="530" y2="140" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 2: SoundHelper and Scene Lifecycle Hooks -->
  <rect x="150" y="150" width="180" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="240" y="177" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">SoundHelper</text>

  <rect x="440" y="150" width="180" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="530" y="177" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">Scene Lifecycle Hooks</text>

  <!-- Arrows Layer 2 -> Layer 3 (SoundCommand) -->
  <line x1="240" y1="194" x2="350" y2="250" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="530" y1="194" x2="440" y2="250" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 3: SoundCommand (accent) -->
  <rect x="200" y="250" width="380" height="50" rx="8" ry="8" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="390" y="280" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">SoundCommand</text>

  <!-- Arrow Layer 3 -> Layer 4 -->
  <line x1="390" y1="300" x2="390" y2="350" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 4: SoundAPI (abstract) -->
  <rect x="260" y="360" width="260" height="50" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="390" y="382" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-style="italic">&lt;&lt;abstract&gt;&gt;</text>
  <text x="390" y="400" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">SoundAPI</text>

  <!-- Arrows Layer 4 -> Layer 5 -->
  <line x1="340" y1="410" x2="270" y2="460" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="410" x2="510" y2="460" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 5: OpenAL Backend and Null Backend -->
  <rect x="170" y="470" width="180" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="260" y="497" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">OpenAL Backend</text>

  <rect x="430" y="470" width="180" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="520" y="497" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">Null Backend</text>

  <!-- Right side: SoundData and SoundHandle -->
  <rect x="650" y="200" width="130" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="715" y="227" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">SoundData</text>

  <!-- SoundData -> SoundCommand -->
  <line x1="650" y1="235" x2="580" y2="265" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="630" y="243" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">buffer</text>

  <rect x="650" y="300" width="130" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="715" y="327" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">SoundHandle</text>

  <!-- SoundHandle returned upward -->
  <line x1="660" y1="300" x2="580" y2="278" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="636" y="296" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">returns</text>

  <!-- Left side: SoundSystem and SoundLibrary -->
  <rect x="15" y="250" width="130" height="50" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="80" y="280" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">SoundSystem</text>

  <rect x="15" y="340" width="130" height="50" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="80" y="360" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">AssetLibrary</text>
  <text x="80" y="378" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">SoundLibrary</text>

  <!-- SoundSystem manages SoundLibrary -->
  <line x1="80" y1="300" x2="80" y2="330" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="100" y="320" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">manages</text>

  <!-- SoundLibrary holds SoundData -->
  <line x1="145" y1="355" x2="650" y2="225" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="350" y="280" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" transform="rotate(-12, 350, 280)">holds</text>

  <!-- Layer labels on far left -->
  <text x="10" y="77" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Application</text>
  <text x="10" y="177" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Helpers</text>
  <text x="150" y="320" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Command</text>
  <text x="150" y="420" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Abstraction</text>
  <text x="150" y="520" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-style="italic">Implementation</text>

  <!-- PlayParams note near SoundCommand -->
  <rect x="650" y="108" width="130" height="44" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="715" y="135" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="14">PlayParams</text>

  <!-- PlayParams -> SoundCommand -->
  <line x1="650" y1="145" x2="580" y2="255" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <rect x="15" y="550" width="770" height="55" rx="8" ry="8" fill="none" stroke="#8b949e" stroke-width="0.5"/>
  <text x="30" y="570" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">Legend:</text>
  <line x1="30" y1="585" x2="70" y2="585" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="80" y="590" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">calls / depends on</text>
  <line x1="250" y1="585" x2="290" y2="585" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="300" y="590" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">data reference</text>
  <rect x="470" y="575" width="40" height="16" rx="4" ry="4" fill="#1f6feb" stroke="#58a6ff" stroke-width="1"/>
  <text x="520" y="590" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">key entry point</text>
  <rect x="640" y="575" width="40" height="16" rx="4" ry="4" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="690" y="590" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">abstract</text>
</svg>
