<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <rect id="background" x="0" y="0" width="800" height="520" rx="12" ry="12" fill="#1c2128"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d29922"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold">Renderer2D Per-Frame Pipeline</text>

  <!-- ===== Phase 1: Begin ===== -->
  <rect x="30" y="48" width="200" height="36" rx="8" ry="8" fill="#1f6feb" stroke="#8b949e" stroke-width="1.5"/>
  <text x="130" y="71" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">beginScene(camera)</text>

  <line x1="230" y1="66" x2="268" y2="66" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="270" y="48" width="220" height="36" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="380" y="71" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">Upload camera UBO (binding 0)</text>

  <line x1="490" y1="66" x2="528" y2="66" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="530" y="48" width="170" height="36" rx="8" ry="8" fill="#2d333b" stroke="#8b949e" stroke-width="1.5"/>
  <text x="615" y="71" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="12">startBatch() — reset</text>

  <!-- ===== Phase 2: Accumulation ===== -->
  <line x1="400" y1="84" x2="400" y2="108" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="60" y="110" width="680" height="130" rx="10" ry="10" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="400" y="130" text-anchor="middle" fill="#3fb950" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">Batch Accumulation (per draw call)</text>

  <!-- Draw calls -->
  <rect x="80" y="142" width="120" height="28" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="140" y="161" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">drawQuad()</text>

  <rect x="210" y="142" width="120" height="28" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="270" y="161" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">drawCircle()</text>

  <rect x="340" y="142" width="120" height="28" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="400" y="161" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">drawLine()</text>

  <rect x="470" y="142" width="120" height="28" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="530" y="161" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">drawString()</text>

  <rect x="600" y="142" width="130" height="28" rx="6" ry="6" fill="#1a2332" stroke="#8b949e" stroke-width="1"/>
  <text x="665" y="161" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">drawBackground()</text>

  <!-- Accumulation details -->
  <text x="400" y="192" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">Vertices appended to per-type buffers (quad, circle, line, text)</text>
  <text x="400" y="207" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">Textures assigned to texture slots (slot 0 = white, 1..N = scene textures)</text>

  <!-- Decision diamond -->
  <text x="400" y="230" text-anchor="middle" fill="#d29922" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold">If indexCount ≥ 120K or texture slots full → nextBatch() (flush + restart)</text>

  <!-- ===== Phase 3: Flush ===== -->
  <line x1="400" y1="240" x2="400" y2="268" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="120" y="270" width="560" height="36" rx="8" ry="8" fill="#1f6feb" stroke="#8b949e" stroke-width="1.5"/>
  <text x="400" y="293" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">endScene() → flush()</text>

  <!-- Flush detail box -->
  <line x1="400" y1="306" x2="400" y2="328" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="40" y="330" width="720" height="140" rx="10" ry="10" fill="#21262d" stroke="#d29922" stroke-width="1.5"/>
  <text x="400" y="350" text-anchor="middle" fill="#d29922" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">Flush Order (single render pass)</text>

  <!-- Flush steps -->
  <rect x="60" y="362" width="130" height="28" rx="6" ry="6" fill="#1a2332" stroke="#d29922" stroke-width="1"/>
  <text x="125" y="381" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">1. Bind textures</text>

  <line x1="190" y1="376" x2="208" y2="376" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="210" y="362" width="100" height="28" rx="6" ry="6" fill="#1a2332" stroke="#d29922" stroke-width="1"/>
  <text x="260" y="381" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">2. Background</text>

  <line x1="310" y1="376" x2="328" y2="376" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="330" y="362" width="80" height="28" rx="6" ry="6" fill="#1a2332" stroke="#d29922" stroke-width="1"/>
  <text x="370" y="381" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">3. Quads</text>

  <line x1="410" y1="376" x2="428" y2="376" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="430" y="362" width="80" height="28" rx="6" ry="6" fill="#1a2332" stroke="#d29922" stroke-width="1"/>
  <text x="470" y="381" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">4. Circles</text>

  <line x1="510" y1="376" x2="528" y2="376" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="530" y="362" width="80" height="28" rx="6" ry="6" fill="#1a2332" stroke="#d29922" stroke-width="1"/>
  <text x="570" y="381" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">5. Lines</text>

  <line x1="610" y1="376" x2="628" y2="376" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="630" y="362" width="80" height="28" rx="6" ry="6" fill="#1a2332" stroke="#d29922" stroke-width="1"/>
  <text x="670" y="381" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="11">6. Text</text>

  <!-- GPU submit note -->
  <text x="400" y="418" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">Each step: upload vertex data → bind DrawData → RenderCommand::drawData()</text>
  <text x="400" y="435" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">Background rendered first within the batch to share the same Vulkan render pass</text>
  <text x="400" y="452" text-anchor="middle" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="11">Circles and lines use separate shaders (SDF circle, line-mode draw)</text>

  <!-- Legend -->
  <rect x="120" y="475" width="14" height="14" rx="3" ry="3" fill="#1f6feb"/>
  <text x="142" y="487" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Lifecycle calls</text>
  <rect x="280" y="475" width="14" height="14" rx="3" ry="3" fill="#21262d" stroke="#3fb950" stroke-width="1"/>
  <text x="302" y="487" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Accumulation phase</text>
  <rect x="440" y="475" width="14" height="14" rx="3" ry="3" fill="#21262d" stroke="#d29922" stroke-width="1"/>
  <text x="462" y="487" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10">Flush phase (GPU submit)</text>
</svg>
