OwlProject:
  name: OwlFeatureDemo
  firstScene: scenes/main_menu.owl
  version: 0.2.2
  author: Silmaen
  description: ho ho ho
  icon: logo/logo_owl.png
  window:
    width: 1280
    height: 720
    fullscreen: false
    resizable: true
  RendererStack:
    - Type: Renderer2D
      Name: world
    - Type: RendererRaycast
      Name: raycast_world
      DefaultConfig:
        Fov: 75.0
        MaxDistance: 32.0
        CeilingColor: [0.18, 0.20, 0.30, 1.0]
        FloorColor: [0.20, 0.16, 0.12, 1.0]
    - Type: RendererVoxel
      Name: voxel_world
      DefaultConfig:
        SunDirection: [-0.4, -1.0, -0.6]
        Ambient: [0.4, 0.4, 0.45]
    - Type: Renderer2D
      Name: ui